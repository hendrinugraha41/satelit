<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Drone Satellite Viewer</title>

    <!-- Cesium CSS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <!-- CSS Sendiri -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>Memuat Peta...</p>
</div>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>🛰 Drone Satellite Viewer</h2>

        <div class="card">

            <label>Latitude</label>
            <input type="number" id="latitude" step="any" value="-0.502145">

            <label>Longitude</label>
            <input type="number" id="longitude" step="any" value="117.153721">

            <button id="btnGo">
                📍 Tampilkan Lokasi
            </button>

        </div>

        <div class="card">

            <label>Ketinggian Kamera</label>

            <select id="height">

                <option value="20">20 Meter</option>
                <option value="30">30 Meter</option>
                <option value="50">50 Meter</option>
                <option value="100" selected>100 Meter</option>
                <option value="200">200 Meter</option>
                <option value="500">500 Meter</option>
                <option value="1000">1000 Meter</option>

            </select>

        </div>

        <div class="card">

            <label>Heading</label>

            <input type="range"
                   id="heading"
                   min="0"
                   max="360"
                   value="0">

            <span id="headingValue">0°</span>

        </div>

        <div class="card">

            <label>Pitch</label>

            <input type="range"
                   id="pitch"
                   min="-90"
                   max="0"
                   value="-90">

            <span id="pitchValue">-90°</span>

        </div>

        <div class="card">

            <button id="btnDownloadPNG">
                📷 Download PNG
            </button>

            <button id="btnDownloadJPG">
                🖼 Download JPG
            </button>

        </div>

        <div class="card">

            <button id="btnGPS">
                📡 Lokasi Saya
            </button>

            <button id="btnCopy">
                📋 Copy Koordinat
            </button>

        </div>

        <div class="card">

            <button id="btnGoogle">
                🌍 Google Maps
            </button>

        </div>

    </aside>

    <!-- Viewer -->
    <main>

        <div id="toolbar">

            <span id="status">
                Siap...
            </span>

        </div>

        <div id="cesiumContainer"></div>

    </main>

</div>

<!-- Cesium JS -->
<script src="https://cesium.com/downloads/cesiumjs/releases/1.132/Build/Cesium/Cesium.js"></script>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
